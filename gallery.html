<!DOCTYPE html>
<html>
<head>

<title>KIIT Gallery</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

h1{
text-align:center;
padding:20px;
}

.gallery{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<h1>KIIT University Gallery</h1>

<div class="gallery">

<img src="https://content3.jdmagicbox.com/comp/bhubaneshwar/l8/0674px674.x674.171202160320.s7l8/catalogue/kiit-cricket-stadium-campus-13-bhubaneswar-bhubaneshwar-stadiums-qjwhrjhi09.jpg">
